apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: notification-system
data:
  DB_URL: jdbc:postgresql://postgres:5432/notification_db
  DB_USERNAME: notification_app
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_ENABLED: "true"
  REDIS_PUBSUB_ENABLED: "true"
  REDIS_UNREAD_COUNT_TTL_MINUTES: "60"
  SEED_ENABLED: "true"
  SUPER_ADMIN_EMAIL: admin@example.com
  SUPER_ADMIN_FULL_NAME: Super Admin
  OTP_EXPIRY_MINUTES: "5"
  OTP_MAX_ATTEMPTS: "5"
  OTP_RATE_LIMIT_WINDOW_MINUTES: "15"
  OTP_LOGIN_RATE_LIMIT: "5"
  OTP_PASSWORD_RESET_RATE_LIMIT: "5"
  ADMIN_NOTIFICATION_RATE_LIMIT: "20"
  ADMIN_NOTIFICATION_RATE_LIMIT_WINDOW_MINUTES: "1"
  NOTIFICATION_RETRY_ENABLED: "true"
  NOTIFICATION_RETRY_FIXED_DELAY_MILLIS: "30000"
  NOTIFICATION_RETRY_INITIAL_DELAY_MILLIS: "15000"
  NOTIFICATION_RETRY_LOCK_TTL_SECONDS: "45"
  NOTIFICATION_RETRY_MAX_ATTEMPTS: "3"
  NOTIFICATION_RETRY_BATCH_SIZE: "25"
  JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: "900"
  JWT_REFRESH_TOKEN_EXPIRATION_SECONDS: "604800"
  JWT_ACCESS_COOKIE_NAME: access_token
  JWT_REFRESH_COOKIE_NAME: refresh_token
  JWT_COOKIE_SECURE: "false"
  JWT_COOKIE_SAME_SITE: Strict
  CORS_ALLOWED_ORIGINS: http://localhost:5173,http://notification.localhost
  MAIL_HOST: smtp.gmail.com
  MAIL_PORT: "587"
  MAIL_FROM: renukaprasadms00@gmail.com
  VITE_API_BASE_URL: /api
