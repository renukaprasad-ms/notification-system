spring:
  datasource:
    url: jdbc:h2:mem:notification-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 2525

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-characters
  seed:
    enabled: false
  redis:
    enabled: false
    pubsub:
      enabled: false
  notification:
    retry:
      enabled: false
