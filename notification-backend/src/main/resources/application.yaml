spring:
  application:
    name: notification-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    access-cookie-name: ${JWT_ACCESS_COOKIE_NAME:access_token}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refresh_token}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Strict}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    async:
      core-pool-size: ${MAIL_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${MAIL_ASYNC_MAX_POOL_SIZE:4}
      queue-capacity: ${MAIL_ASYNC_QUEUE_CAPACITY:100}
  seed:
    enabled: ${SEED_ENABLED:true}
    super-admin:
      email: ${SUPER_ADMIN_EMAIL:admin@example.com}
      password: ${SUPER_ADMIN_PASSWORD:Admin@12345}
      full-name: ${SUPER_ADMIN_FULL_NAME:Super Admin}
  redis:
    enabled: ${REDIS_ENABLED:true}
    cache:
      unread-count-ttl-minutes: ${REDIS_UNREAD_COUNT_TTL_MINUTES:60}
    pubsub:
      enabled: ${REDIS_PUBSUB_ENABLED:true}
      notification-channel: ${REDIS_NOTIFICATION_CHANNEL:notification-events}
  rate-limit:
    otp:
      window-minutes: ${OTP_RATE_LIMIT_WINDOW_MINUTES:15}
      login:
        limit: ${OTP_LOGIN_RATE_LIMIT:5}
      password-reset:
        limit: ${OTP_PASSWORD_RESET_RATE_LIMIT:5}
    notification:
      admin:
        limit: ${ADMIN_NOTIFICATION_RATE_LIMIT:20}
        window-minutes: ${ADMIN_NOTIFICATION_RATE_LIMIT_WINDOW_MINUTES:1}
  notification:
    queue:
      enabled: ${NOTIFICATION_QUEUE_ENABLED:true}
      stream-key: ${NOTIFICATION_QUEUE_STREAM_KEY:notification:dispatch}
      consumer-group: ${NOTIFICATION_QUEUE_CONSUMER_GROUP:notification-dispatchers}
      fixed-delay-millis: ${NOTIFICATION_QUEUE_FIXED_DELAY_MILLIS:1000}
      initial-delay-millis: ${NOTIFICATION_QUEUE_INITIAL_DELAY_MILLIS:1000}
      batch-size: ${NOTIFICATION_QUEUE_BATCH_SIZE:100}
      block-timeout-millis: ${NOTIFICATION_QUEUE_BLOCK_TIMEOUT_MILLIS:1000}
    retry:
      enabled: ${NOTIFICATION_RETRY_ENABLED:true}
      fixed-delay-millis: ${NOTIFICATION_RETRY_FIXED_DELAY_MILLIS:30000}
      initial-delay-millis: ${NOTIFICATION_RETRY_INITIAL_DELAY_MILLIS:15000}
      lock-ttl-seconds: ${NOTIFICATION_RETRY_LOCK_TTL_SECONDS:45}
      max-attempts: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:3}
      batch-size: ${NOTIFICATION_RETRY_BATCH_SIZE:25}
