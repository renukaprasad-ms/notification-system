spring:
  application:
    name: notification-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    access-cookie-name: ${JWT_ACCESS_COOKIE_NAME:access_token}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refresh_token}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Strict}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
  seed:
    enabled: ${SEED_ENABLED:true}
    super-admin:
      email: ${SUPER_ADMIN_EMAIL:admin@example.com}
      password: ${SUPER_ADMIN_PASSWORD:Admin@12345}
      full-name: ${SUPER_ADMIN_FULL_NAME:Super Admin}
