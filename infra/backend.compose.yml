services:
  notification-backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    container_name: notification-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SEED_ENABLED: ${SEED_ENABLED:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@example.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-Admin@12345}
      SUPER_ADMIN_FULL_NAME: ${SUPER_ADMIN_FULL_NAME:-Super Admin}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-5}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-${MAIL_USERNAME:-}}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_EXPIRATION_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:-900}
      JWT_REFRESH_TOKEN_EXPIRATION_SECONDS: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:-604800}
      JWT_ACCESS_COOKIE_NAME: ${JWT_ACCESS_COOKIE_NAME:-access_token}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refresh_token}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      JWT_COOKIE_SAME_SITE: ${JWT_COOKIE_SAME_SITE:-Strict}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_PUBSUB_ENABLED: ${REDIS_PUBSUB_ENABLED:-true}
      REDIS_UNREAD_COUNT_TTL_MINUTES: ${REDIS_UNREAD_COUNT_TTL_MINUTES:-60}
      OTP_RATE_LIMIT_WINDOW_MINUTES: ${OTP_RATE_LIMIT_WINDOW_MINUTES:-15}
      OTP_LOGIN_RATE_LIMIT: ${OTP_LOGIN_RATE_LIMIT:-5}
      OTP_PASSWORD_RESET_RATE_LIMIT: ${OTP_PASSWORD_RESET_RATE_LIMIT:-5}
      ADMIN_NOTIFICATION_RATE_LIMIT: ${ADMIN_NOTIFICATION_RATE_LIMIT:-20}
      ADMIN_NOTIFICATION_RATE_LIMIT_WINDOW_MINUTES: ${ADMIN_NOTIFICATION_RATE_LIMIT_WINDOW_MINUTES:-1}
      NOTIFICATION_RETRY_ENABLED: ${NOTIFICATION_RETRY_ENABLED:-true}
      NOTIFICATION_RETRY_FIXED_DELAY_MILLIS: ${NOTIFICATION_RETRY_FIXED_DELAY_MILLIS:-30000}
      NOTIFICATION_RETRY_INITIAL_DELAY_MILLIS: ${NOTIFICATION_RETRY_INITIAL_DELAY_MILLIS:-15000}
      NOTIFICATION_RETRY_LOCK_TTL_SECONDS: ${NOTIFICATION_RETRY_LOCK_TTL_SECONDS:-45}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_RETRY_BATCH_SIZE: ${NOTIFICATION_RETRY_BATCH_SIZE:-25}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - notification-network

networks:
  notification-network:
    name: notification-network
